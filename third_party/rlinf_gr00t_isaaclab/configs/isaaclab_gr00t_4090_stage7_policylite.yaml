defaults:
  - env/isaaclab_stack_cube@env.train
  - env/isaaclab_stack_cube@env.eval
  - model/gr00t@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    env: 0
    rollout:
      node_group: "rollout"
      placement: 0
    actor: 0
  node_groups:
    - label: "rollout"
      node_ranks: all
      env_configs:
        - node_ranks: all
          env_vars:
            - OMP_NUM_THREADS: 32

runner:
  task_type: embodied
  logger:
    log_path: "/share/liziwen/simulation/rlinf-gr00t-isaaclab/results"
    project_name: rlinf
    experiment_name: "isaaclab_gr00t_4090_stage7_policylite"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: -1
  weight_sync_interval: 999999
  skip_initial_weight_sync: True
  only_eval: False
  val_check_interval: -1
  save_interval: 20
  seq_length: 1024
  max_prompt_length: 30
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 2
  eval_rollout_epoch: 3
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 3
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    max_episode_steps: 448
    max_steps_per_rollout_epoch: 448
    use_fixed_reset_state_ids: False
    init_params:
      table_cam:
        height: 256
        width: 256
      wrist_cam:
        height: 256
        width: 256
  eval:
    total_num_envs: 1
    max_episode_steps: 448
    max_steps_per_rollout_epoch: 448
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: True
    init_params:
      table_cam:
        height: 256
        width: 256
      wrist_cam:
        height: 256
        width: 256
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_path: "/share/liziwen/simulation/rlinf-gr00t-isaaclab/checkpoints/RLinf-Gr00t-SFT-Stack-cube"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: True
  model:
    model_path: "/share/liziwen/simulation/rlinf-gr00t-isaaclab/checkpoints/RLinf-Gr00t-SFT-Stack-cube"
    add_value_head: True
    embodiment_tag: "isaaclab_franka"
    obs_converter_type: "isaaclab_stack_cube"
    num_action_chunks: 16
    tune_projector: True
    tune_diffusion_model: False
    train_value_head_only: False
  optim:
    lr: 1.0e-5
    value_lr: 2.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    cpu_offload: False
    offload_pin_memory: False
    use_orig_params: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
