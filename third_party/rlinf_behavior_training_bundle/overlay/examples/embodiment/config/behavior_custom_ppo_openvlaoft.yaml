defaults:
  - env/behavior_custom_r1pro@env.train
  - env/behavior_custom_r1pro@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0
    env: 0
    rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "behavior_custom_ppo_openvlaoft"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 4
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 496
  eval:
    total_num_envs: 1
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 496
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_path: "/share/liziwen/simulation/RLinf-OpenVLAOFT-Behavior/"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 8
  seed: 1234
  enable_offload: True
  model:
    model_path: "/share/liziwen/simulation/RLinf-OpenVLAOFT-Behavior/"
    model_type: "openvla_oft"
    value_type: ${algorithm.reward_type}
    action_dim: 23
    unnorm_key: behavior_turn_on_radio
    add_value_head: True
    num_images_in_input: 3
    is_lora: True
    lora_rank: 32
    lora_path: "/share/liziwen/simulation/RLinf-OpenVLAOFT-Behavior/lora_adapter"
  optim:
    lr: 1.0e-4
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 10.0
    weight_decay: 0.01
    critic_warmup_steps: 0
  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    cpu_offload: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
